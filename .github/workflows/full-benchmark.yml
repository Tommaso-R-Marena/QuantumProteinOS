name: Full Scientific Benchmark (Monthly)

on:
  schedule:
    - cron: '0 4 1 * *'  # 4 AM UTC on the 1st of every month
  workflow_dispatch:     # Manual trigger from GitHub UI

jobs:
  # -------------------------------------------------------------------------
  # 1. DisorderNet — full DisProt CAID3, AUC threshold 0.82
  # -------------------------------------------------------------------------
  disorder-full:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache ESM model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/hub
          key: esm2-t6-8M-UR50D-weights
      - name: Install dependencies
        run: pip install -e ".[ml,dev]"
      - name: Run DisorderNet full benchmark
        run: python benchmarks/disorder/run.py --full
      - name: Assert AUC >= 0.82
        run: |
          python -c "
          import json
          with open('benchmarks/disorder/results/metrics.json') as f:
              m = json.load(f)
          auc = m['auc_roc']
          assert auc >= 0.82, f'DisorderNet full AUC {auc:.3f} below 0.82'
          print(f'PASS: DisorderNet full AUC = {auc:.3f}')
          "
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: disorder-full-${{ github.run_id }}
          path: benchmarks/disorder/results/
          retention-days: 90

  # -------------------------------------------------------------------------
  # 2. Rotamer IWS-QAOA — real PDB rotamer QUBOs (8 proteins)
  # -------------------------------------------------------------------------
  rotamer-full:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e .
          pip install requests
      - name: Run rotamer full benchmark (real PDB QUBOs)
        run: python benchmarks/rotamer_packing/run.py --full
      - name: Assert IWS-QAOA beats greedy on all real instances
        run: |
          python -c "
          import json
          with open('benchmarks/rotamer_packing/results/comparison_table.json') as f:
              m = json.load(f)
          real_instances = [i for i in m['instances'] if i.get('real_data', False)]
          assert len(real_instances) >= 6, f'Only {len(real_instances)} real instances (expected >=6)'
          for inst in real_instances:
              assert inst['iws_qaoa_gap_pct'] <= inst['greedy_gap_pct'], (
                  f"{inst['name']}: IWS gap {inst['iws_qaoa_gap_pct']:.1f}% > greedy gap {inst['greedy_gap_pct']:.1f}%"
              )
              print(f\"PASS {inst['name']} (N={inst['N_residues']}): IWS {inst['iws_qaoa_gap_pct']:.1f}% <= greedy {inst['greedy_gap_pct']:.1f}%\")
          "
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: rotamer-full-${{ github.run_id }}
          path: benchmarks/rotamer_packing/results/
          retention-days: 90

  # -------------------------------------------------------------------------
  # 3. QICESS autoinhibited — 22 proteins, real AlphaFold structures
  # -------------------------------------------------------------------------
  autoinhibited-full:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e .
          pip install requests biopython

      # ------------------------------------------------------------------
      # Network connectivity check — diagnose before we try to download
      # ------------------------------------------------------------------
      - name: Debug network access to AlphaFold DB
        run: |
          echo "=== curl HEAD test ==="
          curl -v --max-time 15 -o /dev/null \
            https://alphafold.ebi.ac.uk/files/AF-P12931-F1-model_v4.cif \
            2>&1 | head -40 || true

      # ------------------------------------------------------------------
      # Pre-download all 22 AF mmCIF structures via curl.
      # curl uses the system CA bundle and does not go through Python's
      # requests/urllib3 SSL stack, which can behave differently in CI.
      # Files land in tests/fixtures/alphafold/ where run.py will find
      # them as cached hits (skipping HTTP entirely).
      # ------------------------------------------------------------------
      - name: Pre-download AlphaFold mmCIF fixtures
        run: |
          mkdir -p tests/fixtures/alphafold
          BASE="https://alphafold.ebi.ac.uk/files"
          # List: UniProt IDs used in FULL_AUTOINHIBITED_DATA
          IDS="P12931 P42768 P16333 Q9BYF1 Q8IYH5 P07947 P00533 P00519 P15056 P04049 P17612 P19784 P45983 Q16539 P27361 Q05397 P36888 P07333 P10721 P04629 P06241"
          for ID in $IDS; do
            OUT="tests/fixtures/alphafold/AF_${ID}_v4.cif"
            if [ ! -f "$OUT" ]; then
              echo "Downloading AF-${ID}-F1-model_v4.cif ..."
              curl --silent --max-time 60 --retry 3 --retry-delay 5 \
                -o "$OUT" \
                "${BASE}/AF-${ID}-F1-model_v4.cif" \
                || (echo "v4 failed, trying v3..."; \
                    curl --silent --max-time 60 --retry 2 \
                    -o "$OUT" \
                    "${BASE}/AF-${ID}-F1-model_v3.cif" \
                    || echo "WARNING: could not download AF-${ID}")
              # Remove empty files (404 responses)
              [ -s "$OUT" ] || rm -f "$OUT"
            fi
          done
          echo "=== Downloaded fixtures ==="
          ls -lh tests/fixtures/alphafold/ || echo "(none)"

      - name: Run QICESS full benchmark (22 proteins, real AF structures)
        run: python benchmarks/autoinhibited/run.py --full

      - name: Assert QICESS beats real AlphaFold on imfdRMSD
        run: |
          python -c "
          import json
          with open('benchmarks/autoinhibited/results/stats.json') as f:
              m = json.load(f)
          assert m['real_af_comparison'] == True, 'Full mode must use real AF structures'
          assert m['n_structures'] >= 18, f\"Only {m['n_structures']} structures processed (expected >=18)\"
          qicess_frac = m['qicess_frac_below_3A']
          af3_frac = m['af3_frac_below_3A']
          p_value = m['wilcoxon_p_qicess_vs_af3']
          assert qicess_frac > af3_frac, (
              f'QICESS {qicess_frac:.2f} not better than AF {af3_frac:.2f}'
          )
          assert p_value < 0.05, f'Wilcoxon p={p_value:.4f} not significant'
          print(f'PASS: QICESS {qicess_frac:.0%} vs AF {af3_frac:.0%}, p={p_value:.4f} ({m[\"n_structures\"]} structures)')
          "
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: autoinhibited-full-${{ github.run_id }}
          path: benchmarks/autoinhibited/results/
          retention-days: 90

  # -------------------------------------------------------------------------
  # Generate consolidated scientific report
  # -------------------------------------------------------------------------
  generate-full-report:
    runs-on: ubuntu-latest
    needs:
      - disorder-full
      - rotamer-full
      - autoinhibited-full
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Generate full scientific report
        run: |
          python scripts/generate_ci_report.py \
            --artifacts-dir artifacts/ \
            --output reports/full_benchmark_report.md \
            --commit-sha ${{ github.sha }} \
            --run-id ${{ github.run_id }} \
            --full-mode
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: full-benchmark-report-${{ github.run_id }}
          path: reports/full_benchmark_report.md
          retention-days: 90
      - name: Post summary
        run: cat reports/full_benchmark_report.md >> $GITHUB_STEP_SUMMARY
